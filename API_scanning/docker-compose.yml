# ---------------------------------------------------------------
# STANDALONE:
#   docker compose up -d --build
#   http://localhost:5000
#
# BIGGER PROJECT:
#   Copy the nexcorp-portal service block into your root
#   docker-compose.yml. Change lab-network to external: true
#   and set the name to your existing project network.
# ---------------------------------------------------------------

services:
  nexcorp-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexcorp-portal
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=dev-secret-change-in-prod
    networks:
      - lab-network
    labels:
      - "lab.service=nexcorp-portal"
      - "lab.type=web-app"
      - "lab.vulnerabilities=broken-auth,idor,exposed-admin,excessive-data"

networks:
  lab-network:
    name: lab-network
    driver: bridge
    # To attach to an existing project network instead:
    # external: true
    # name: your-project-network