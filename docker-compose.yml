  #     - "diable.lab=xxe"
  #     - "diable.difficulty=hard"
  #     - "diable.tag=XML"
  #   networks:
  #     - diable-network
  #   restart: unless-stopped

  # XSS Lab (à venir)
  # xss-lab:
  #   build: ./attacks/xss-lab
  #   container_name: xss-lab
  #   ports:
  #     - "8100:80"
  #   labels:
  #     - "diable.lab=xss"
  #     - "diable.difficulty=medium"
  #     - "diable.tag=WEB"
  #   networks:
  #     - diable-network
  #   restart: unless-stopped

  # CSRF Lab (à venir)
  # csrf-lab:
  #   build: ./attacks/csrf-lab
  #   container_name: csrf-lab
  #   ports:
  #     - "8110:80"
  #   labels:
  #     - "diable.lab=csrf"
  #     - "diable.difficulty=medium"
  #     - "diable.tag=WEB"
  #   networks:
  #     - diable-network
  #   restart: unless-stopped

networks:
  diable-network:
    name: diable-network
    driver: bridge

volumes:
  postgres-data:
    name: diable-postgres-data
