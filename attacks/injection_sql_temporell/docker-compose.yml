version: "3.9"

services:
  sqli-lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqli_time_lab
    ports:
      - "5000:5000"        # http://localhost:5000
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - db_data:/tmp        # persistance SQLite entre redémarrages
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local