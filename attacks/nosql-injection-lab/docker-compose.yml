services:
  mongodb:
    image: mongo:7.0
    container_name: nosql-mongodb-user-${USER_ID}
    environment:
      MONGO_INITDB_DATABASE: vulnerable_app
    networks:
      - internal
    volumes:
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - mongodb-data-user-${USER_ID}:/data/db 

  app:
    image: diable/nosql-injection-lab:latest
    container_name: nosql-app-user-${USER_ID}
    ports:
      - "${LAB_PORT}:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/vulnerable_app
      - NODE_ENV=production
      - DEBUG_MODE=false
    depends_on:
      - mongodb
    networks:
      - internal
      - lab-network

networks:
  internal:
    name: nosql-internal-user-${USER_ID}
    driver: bridge
  lab-network:
    external: true
    name: lab-network

volumes:
  mongodb-data-user-${USER_ID}:
    name: mongodb-data-user-${USER_ID}