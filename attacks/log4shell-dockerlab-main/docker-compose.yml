# labs/log4shell/docker-compose.yml
version: '3.8'

services:
  vulnerable:
    build:
      context: .
      dockerfile: Dockerfile.vulnerable
    container_name: log4shell-vulnerable-user-${USER_ID}
    ports:
      - "${VULN_PORT}:8080"
    networks:
      - internal
      - lab-network

  ldap:
    build:
      context: .
      dockerfile: Dockerfile.ldap
    container_name: log4shell-ldap-user-${USER_ID}
    environment:
      # On remplace le 172.17.0.1 hardcodé par le nom du service
      - ATTACKER_HOST=vulnerable
      - ATTACKER_PORT=8888
    networks:
      - internal

networks:
  internal:
    # Réseau privé entre les deux conteneurs du lab
    name: log4shell-internal-user-${USER_ID}
    driver: bridge
  lab-network:
    external: true
    name: lab-network