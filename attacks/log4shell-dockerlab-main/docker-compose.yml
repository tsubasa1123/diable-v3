version: "3.8"

services:
  vulnerable:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log4shell-vulnerable-user-${USER_ID}
    #ports:
    #  - "${VULN_PORT}:8080"
    depends_on:
      - ldap
      - attacker-webserver
    networks:
      - internal
      - lab-network

  ldap:
    build:
      context: .
      dockerfile: Dockerfile.ldap
    container_name: log4shell-ldap-user-${USER_ID}
    hostname: ldap
    environment:
      - HTTP_HOST=attacker-webserver
      - HTTP_PORT=8888
    networks:
      - internal

  attacker-webserver:
    build:
      context: .
      dockerfile: Dockerfile.attacker   # ← nouveau Dockerfile
    container_name: log4shell-attacker-user-${USER_ID}
    networks:
      - internal

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: log4shell-dashboard-user-${USER_ID}
    ports:
      - "${LAB_PORT}:5000"       # ← port exposé à l'apprenant
    environment:
      - VULNERABLE_HOST=vulnerable
      - VULNERABLE_PORT=8080
      - LDAP_HOST=ldap
      - LDAP_PORT=1389
    networks:
      - internal
      - lab-network
    depends_on:
      - vulnerable
      - ldap
      - attacker-webserver

networks:
  internal:
    name: log4shell-internal-user-${USER_ID}
    driver: bridge
  lab-network:
    external: true
    name: lab-network