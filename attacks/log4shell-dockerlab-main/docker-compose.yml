services:
  vulnerable:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log4shell-vulnerable-user-${USER_ID}
    environment:
      - VULNERABLE_PORT=8080
    ports:
      - "${VULN_PORT}:8080"
    depends_on:
      - ldap
      - attacker-webserver
    networks:
      - internal
      - lab-network

  ldap:
    build:
      context: .
      dockerfile: Dockerfile.ldap
    container_name: log4shell-ldap-user-${USER_ID}
    hostname: ldap
    environment:
      - HTTP_HOST=attacker-webserver
      - HTTP_PORT=8888
      - LDAP_PORT=1389
    ports:
      - "${LDAP_PORT}:1389"
    networks:
      - internal

  attacker-webserver:
    build:
      context: .
      dockerfile: Dockerfile.attacker
    container_name: log4shell-attacker-user-${USER_ID}
    environment:
      - ATTACKER_HTTP_PORT=8888
    ports:
      - "${ATTACKER_PORT}:8888"
    networks:
      - internal

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: log4shell-dashboard-user-${USER_ID}
    ports:
      - "${LAB_PORT}:5000"
    environment:
      - VULNERABLE_HOST=vulnerable
      - VULNERABLE_PORT=8080
      - LDAP_HOST=ldap
      - LDAP_PORT=1389
      - ATTACKER_HOST=attacker-webserver
      - ATTACKER_HTTP_PORT=8888
      - APP_PORT=5000
      - LAB_FLAG=${LAB_FLAG}
      - LAB_API_KEY=${LAB_API_KEY:-hbmcvhtB8eq91r7syrPLltM6LYi09TKqR7HW1lKjhbmcvhtB8eq91r7syrPLltM6L}
    networks:
      - internal
      - lab-network
    depends_on:
      - vulnerable
      - ldap
      - attacker-webserver

networks:
  internal:
    name: log4shell-internal-user-${USER_ID}
    driver: bridge
  lab-network:
    external: true
    name: lab-network