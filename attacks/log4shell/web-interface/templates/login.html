<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Log4Shell CTF Lab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B0F14 0%, #0F1A2B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e4e4e7;
        }
        
        .login-container {
            background: rgba(26, 31, 58, 0.9);
            border: 1px solid #2d3250;
            border-radius: 20px;
            padding: 50px;
            width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #D41414, #1F6AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a1a1aa;
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #a1a1aa;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: #0F1A2B;
            border: 1px solid #2d3250;
            border-radius: 8px;
            color: #e4e4e7;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00C2FF;
            box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.16);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #D41414, #FF2A2A);
            border: none;
            border-radius: 8px;
            color: #F2F4F8;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 194, 255, 0.35);
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid #ff3366;
            color: #ff3366;
        }
        
        .demo-accounts {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 194, 255, 0.06);
            border-radius: 8px;
            border: 1px solid rgba(0, 194, 255, 0.2);
        }
        
        .demo-accounts h3 {
            font-size: 0.9em;
            color: #1F6AFF;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .demo-account {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .demo-account:hover {
            background: rgba(0, 194, 255, 0.1);
            transform: translateX(5px);
        }
        
        .demo-account span {
            color: #a1a1aa;
        }
        
        .demo-account strong {
            color: #1F6AFF;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🔥</div>
            <h1>Log4Shell CTF Lab</h1>
            <p class="subtitle">CVE-2021-44228 Exploitation Platform</p>
        </div>
        
        <div class="alert alert-error" id="error-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i> Se Connecter
            </button>
        </form>
        
        <div class="demo-accounts">
            <h3><i class="fas fa-info-circle"></i> Comptes de Démonstration</h3>
            <div class="demo-account" onclick="fillLogin('student', 'student123')">
                <span>👨‍🎓 Étudiant:</span>
                <strong>student / student123</strong>
            </div>
            <div class="demo-account" onclick="fillLogin('professor', 'prof123')">
                <span>👨‍🏫 Professeur:</span>
                <strong>professor / prof123</strong>
            </div>
        </div>
    </div>
    
    <script>
        function fillLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    window.location.href = data.redirect;
                } else {
                    const errorDiv = document.getElementById('error-message');
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
