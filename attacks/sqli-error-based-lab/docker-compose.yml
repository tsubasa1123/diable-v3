services:
  sqli-error-based-lab:
    build: .
    image: diable/sqli-error-based-lab:latest
    container_name: sqli-error-based-lab
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_PATH=/app/data/shop.db
      - LAB_NAME=sqli-error-based
      - LAB_FLAG=DIABLE{SQLI_ERROR_BASED_OK}
    volumes:
      - lab-data:/app/data
    restart: unless-stopped
    labels:
      - "diable.lab=sqli-error-based"
      - "diable.difficulty=medium"
      - "diable.tag=WEB"

volumes:
  lab-data: