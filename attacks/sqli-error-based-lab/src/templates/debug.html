<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>DIABLE — Debug</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="hero__title">DIABLE — Dashboard</div>
      <div class="hero__subtitle">Événements observés (sans payloads)</div>
      <nav class="menu">
        <a class="menu__btn active" style="text-decoration:none; display:inline-block" href="/">Retour UI</a>
        <button class="menu__btn" onclick="loadEvents()">Rafraîchir</button>
        <button class="menu__btn" onclick="clearEvents()">Vider</button>
      </nav>
    </header>

    <main class="content">
      <section class="panel active">
        <h2>Events</h2>
        <div class="card" id="out">Chargement...</div>
      </section>
    </main>
  </div>

<script>
async function loadEvents(){
  const out = document.getElementById("out");
  const res = await fetch("/api/debug/events");
  const data = await res.json();
  const events = data.events || [];

  if(events.length === 0){
    out.innerHTML = "<p class='muted'>Aucun événement.</p>";
    return;
  }

  let html = "<table><thead><tr><th>Date</th><th>Mode</th><th>Type</th><th>Détail</th></tr></thead><tbody>";
  for(const e of events){
    html += `<tr><td>${e.ts}</td><td>${e.mode}</td><td>${e.type}</td><td>${e.detail}</td></tr>`;
  }
  html += "</tbody></table>";
  out.innerHTML = html;
}

async function clearEvents(){
  await fetch("/api/debug/clear", {method:"POST"});
  loadEvents();
}

loadEvents();
</script>
</body>
</html>
