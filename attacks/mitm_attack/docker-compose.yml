services:
  victim-server:
    build:
      context: .
      dockerfile: Dockerfile.victim
    image: diable/mitm-victim-server:latest
    container_name: mitm-victim-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    networks:
      - diable-network

  mitm-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: diable/mitm-proxy:latest
    container_name: mitm-proxy
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - TARGET_HOST=victim-server
      - TARGET_PORT=8080
      - DEBUG_MODE=true
    depends_on:
      - victim-server
    networks:
      - diable-network

  app:
    build: .
    image: diable/mitm-attack-lab:latest
    container_name: mitm-lab
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VICTIM_SERVER=http://victim-server:8080
      - MITM_PROXY=http://mitm-proxy:8888
      - NODE_ENV=development
      - DEBUG_MODE=false
    depends_on:
      - victim-server
      - mitm-proxy
    networks:
      - diable-network
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "diable.lab=mitm-attack"
      - "diable.difficulty=medium"
      - "diable.tag=WEB"

networks:
  diable-network:
    name: diable-network
    driver: bridge
